name: Docker Build and Push Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: s12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker if missing
        run: |
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing Docker..."
            sudo apt update
            sudo apt install -y ca-certificates curl gnupg

            sudo install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            sudo chmod a+r /etc/apt/keyrings/docker.gpg

            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
              sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

            sudo apt update
            sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

            sudo systemctl enable docker
            sudo systemctl start docker
          else
            echo "Docker is already installed."
            docker --version
          fi

      - name: Allow Docker socket access
        run: |
          sudo chmod 666 /var/run/docker.sock

      - name: Build Docker image from Dockerfile
        run: |
          docker build -t s12tobi/new:s1 .

      - name: Verify Docker image
        run: |
          docker images | grep "s12tobi/new"

      - name: Remove old container if it exists
        run: |
          docker rm -f s2-new || true

      - name: Run container with port mapping
        run: |
          docker run -d -p 8084:80 --name s2-new s12tobi/new:s1

      - name: Check running containers
        run: |
          docker ps

      - name: Login to Docker Hub using token
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_TOKEN }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker push s12tobi/new:s1